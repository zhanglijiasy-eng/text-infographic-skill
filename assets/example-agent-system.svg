<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" rx="24" fill="#fffdf7"/>
  <rect x="42" y="38" width="1116" height="724" rx="26" fill="#fffaf0" stroke="#111827" stroke-width="4"/>
  <text x="78" y="116" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="800">Agent 到底强在哪？</text>
  <path d="M80 144 C252 130, 394 132, 528 118" stroke="#ef4444" stroke-width="7" stroke-linecap="round"/>

  <rect x="88" y="198" width="226" height="178" rx="20" fill="#dbeafe" stroke="#111827" stroke-width="3"/>
  <circle cx="128" cy="238" r="22" fill="#2563eb"/>
  <text x="121" y="247" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">1</text>
  <text x="164" y="248" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800">理解目标</text>
  <text x="116" y="304" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="22">读懂上下文</text>
  <text x="116" y="338" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="22">明确要完成什么</text>

  <rect x="368" y="198" width="226" height="178" rx="20" fill="#dcfce7" stroke="#111827" stroke-width="3"/>
  <circle cx="408" cy="238" r="22" fill="#16a34a"/>
  <text x="401" y="247" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">2</text>
  <text x="444" y="248" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800">选择工具</text>
  <text x="396" y="304" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="22">调用搜索、文件</text>
  <text x="396" y="338" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="22">代码或浏览器</text>

  <rect x="648" y="198" width="226" height="178" rx="20" fill="#ffedd5" stroke="#111827" stroke-width="3"/>
  <circle cx="688" cy="238" r="22" fill="#f97316"/>
  <text x="681" y="247" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">3</text>
  <text x="724" y="248" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800">执行动作</text>
  <text x="676" y="304" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="22">编辑文件</text>
  <text x="676" y="338" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="22">运行命令</text>

  <rect x="928" y="198" width="176" height="178" rx="20" fill="#fef2f2" stroke="#111827" stroke-width="3"/>
  <circle cx="968" cy="238" r="22" fill="#ef4444"/>
  <text x="961" y="247" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">4</text>
  <text x="1004" y="248" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800">迭代</text>
  <text x="956" y="304" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="22">看结果</text>
  <text x="956" y="338" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="22">继续调整</text>

  <path d="M318 288 H358" stroke="#111827" stroke-width="4" stroke-linecap="round"/>
  <path d="M344 272 L362 288 L344 304" stroke="#111827" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M598 288 H638" stroke="#111827" stroke-width="4" stroke-linecap="round"/>
  <path d="M624 272 L642 288 L624 304" stroke="#111827" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M878 288 H918" stroke="#111827" stroke-width="4" stroke-linecap="round"/>
  <path d="M904 272 L922 288 L904 304" stroke="#111827" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="124" y="456" width="404" height="146" rx="20" fill="#ffffff" stroke="#111827" stroke-width="3"/>
  <text x="164" y="514" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800">Chatbot</text>
  <text x="164" y="560" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="24">主要回答问题</text>

  <rect x="672" y="456" width="404" height="146" rx="20" fill="#ffffff" stroke="#ef4444" stroke-width="4"/>
  <text x="712" y="514" fill="#ef4444" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800">Agent</text>
  <text x="712" y="560" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="24">能把目标推进到完成</text>

  <path d="M538 528 C584 506, 624 506, 662 528" stroke="#111827" stroke-width="4" stroke-linecap="round"/>
  <path d="M640 506 L666 528 L636 542" stroke="#111827" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="96" y="656" width="1008" height="58" rx="20" fill="#fee2e2" stroke="#ef4444" stroke-width="3" stroke-dasharray="10 9"/>
  <text x="160" y="695" fill="#b91c1c" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="800">结论：Agent 的关键不是会聊，而是会调用工具、执行任务、持续迭代。</text>
